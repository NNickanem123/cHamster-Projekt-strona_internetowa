<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wyścigi Chomików</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="main">
    <header>
        <h1>Wyścigi Chomików</h1>
        <div class="kwota">
           <p id="kwota_kwota"> Saldo: 1000 zł</p>
        </div>
    </header>
    <nav class="navigation">
        <a href="main.html" class="nav-guzik active">Wyścigi</a>
        <a href="shop.html" class="nav-guzik">Sklep</a>
        <a href="inventory.html" class="nav-guzik">Mój Chomik</a>
    </nav> 
    <div class="gra">
        <div class="obstawianie_panel">
            <h2>Obstaw wyścig</h2>
            <div class="wybor_chomikow">

                <div class="chomik-opcja">
                    <div class="kula kula-czerw">
                        <img src="assets/images/czerwony homik.png">
                    </div>
                    <p>Czerwony</p>
                    <input type="number" class="kwota_obstawiona" min="1">
                </div>

                <div class="chomik-opcja">
                    <div class="kula kula-nieb">
                        <img src="assets/images/niebieski homik.png">
                    </div>
                    <p>Niebieski</p>
                    <input type="number" class="kwota_obstawiona" min="1">
                </div>

                <div class="chomik-opcja">
                    <div class="kula kula-ziel">
                        <img src="assets/images/zielony homik.png">
                    </div>
                    <p>Zielony</p>
                    <input type="number" class="kwota_obstawiona" min="1">
                </div>

                <div class="chomik-opcja">
                    <div class="kula kula-czar">
                        <img src="assets/images/czarny homik.png">
                    </div>
                    <p>Czarny</p>
                    <input type="number" class="kwota_obstawiona" min="1">
                </div>

                <div class="chomik-opcja">
                    <div class="kula kula-custom">
                       <img src="assets/images/homik.png">
                    </div>
                    <p>Własny chomik</p>
                    <input type="number" class="kwota_obstawiona" min="1">
                </div>
            </div>

            <button id="start_pusty">Zacznij wyścig</button>
            <button id="reset_pusty">Reset</button>
        </div>

        <div class="tor_wyscigowy_div">
            <h2>Tor wyścigowy</h2>
            <canvas id="tor" width="800" height="400"></canvas> <!--Tutaj wszystko wyswietlamy potem-->
            <div id="status_wyscigu"></div>
        </div>
    </div>

    <div class="wyniki_div">
        <h2>Wyniki</h2>
        <div id="wyniki"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>

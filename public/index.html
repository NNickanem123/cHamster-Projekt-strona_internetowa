<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Wyścigi Chomików</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="mainContainer">
        <header>
            <h1>🐹 Wyścigi Chomików 🐹</h1>
            <div class="header-right">
                <div class="balance">
                    <span>Saldo: <span id="balance">1000</span> zł</span>
                </div>
            </div>
        </header>

        <nav class="main-nav">
            <button class="nav-btn active" data-tab="racing">🏁 Wyścigi</button>
            <button class="nav-btn" data-tab="shop">🛒 Sklep</button>
            <button class="nav-btn" data-tab="myHamster">🐹 Mój Chomik</button>
        </nav>

        <div class="tab-content active" id="racing-tab">
        <div class="game-area">
            <div class="betting-panel">
                <h2>Obstaw wyścig</h2>
                <div class="hamsters-selection">
                    <div class="hamster-option" data-hamster="0">
                        <div class="hamster-preview">
                            <div class="ball ball-red">
                                <img src="modele homikó/czerwony homik.png" alt="Czerwony Chomik" class="hamster-img">
                            </div>
                        </div>
                        <p>Czerwony</p>
                        <input type="number" class="bet-amount" placeholder="Kwota" min="1" data-hamster="0">
                    </div>
                    <div class="hamster-option" data-hamster="1">
                        <div class="hamster-preview">
                            <div class="ball ball-blue">
                                <img src="modele homikó/niebieski homik.png" alt="Niebieski Chomik" class="hamster-img">
                            </div>
                        </div>
                        <p>Niebieski</p>
                        <input type="number" class="bet-amount" placeholder="Kwota" min="1" data-hamster="1">
                    </div>
                    <div class="hamster-option" data-hamster="2">
                        <div class="hamster-preview">
                            <div class="ball ball-green">
                                <img src="modele homikó/zielony homik.png" alt="Zielony Chomik" class="hamster-img">
                            </div>
                        </div>
                        <p>Zielony</p>
                        <input type="number" class="bet-amount" placeholder="Kwota" min="1" data-hamster="2">
                    </div>
                    <div class="hamster-option" data-hamster="3">
                        <div class="hamster-preview">
                            <div class="ball ball-black">
                                <img src="modele homikó/czarny homik.png" alt="Czarny Chomik" class="hamster-img">
                            </div>
                        </div>
                        <p>Czarny �?/p>
                        <input type="number" class="bet-amount" placeholder="Kwota" min="1" data-hamster="3">
                    </div>
                    <div class="hamster-option" data-hamster="4" id="myHamsterOption">
                        <div class="hamster-preview">
                            <div class="ball ball-custom">
                                <canvas id="myHamsterPreview" width="50" height="50"></canvas>
                            </div>
                        </div>
                        <p>Mój Chomik �?/p>
                        <input type="number" class="bet-amount" placeholder="Kwota" min="1" data-hamster="4">
                    </div>
                </div>
                <div class="race-controls">
                    <button id="startRace" class="btn btn-primary">Start wyścigu</button>
                    <button id="resetRace" class="btn btn-secondary">Reset</button>
                </div>
            </div>

            <div class="race-track-container">
                <h2>Tor wyścigowy</h2>
                <div class="track-options">
                    <label>
                        <input type="radio" name="trackType" value="straight" checked>
                        Prosty tor
                    </label>
                    <label>
                        <input type="radio" name="trackType" value="curved">
                        Tor z zakrętami
                    </label>
                </div>
                <canvas id="raceTrack" width="800" height="400"></canvas>
                <div id="raceStatus" class="race-status"></div>
            </div>
        </div>

        <div class="results-panel">
            <h2>Wyniki</h2>
            <div id="results"></div>
        </div>
        </div>

        <div class="tab-content" id="shop-tab">
            <div class="shop-container">
                <h2>🛒 Sklep ze Skinami</h2>
                <div class="shop-grid" id="shopGrid">
                </div>
            </div>
        </div>

        <div class="tab-content" id="myHamster-tab">
            <div class="hamster-editor">
                <h2>🐹 Mój Chomik</h2>
                <div class="editor-layout">
                    <div class="preview-section">
                        <h3>Podgląd</h3>
                        <div class="hamster-preview-large">
                            <canvas id="hamsterPreview" width="200" height="200"></canvas>
                        </div>
                        <div class="preview-controls">
                            <label>
                                <input type="checkbox" id="useMyHamster" checked> Użyj mojego chomika w wyścigach
                            </label>
                        </div>
                    </div>
                    <div class="skins-section">
                        <h3>Moje Skiny</h3>
                        <div class="owned-skins" id="ownedSkins">
                        </div>
                        <div class="skin-layers" id="skinLayers">
                            <h4>Aktywne warstwy</h4>
                            <div id="activeLayers">
                                <p class="no-skins">Brak aktywnych skórek</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

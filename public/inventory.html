<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Chomik</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="main">

        <header>
            <h1>Wyścigi Chomików</h1>

            <section class="user-panel">
                <section class="user-info">
                    <span id="userName">Użytkownik</span>
                    <button id="logoutBtn" class="btn btn-primary">Wyloguj</button>
                </section>

                <section class="kwota">
                    <p>Saldo: <span id="kwota_kwota">1000</span> zł</p>
                </section>
            </section>
        </header>

        <nav class="navigation">
            <a href="main.html" class="nav-guzik">Wyścigi</a>
            <a href="shop.html" class="nav-guzik">Sklep</a>
            <a href="inventory.html" class="nav-guzik active">Mój Chomik</a>
        </nav>

        <section class="chomik_edycja_div">
            <section class="podglad_div">
                <section class="hamster-editor">
                    <h2>🐹 Mój Chomik</h2>
                    <section class="editor-layout">
                        <section class="preview-section">
                            <h3>Podgląd</h3>
                            <section class="hamster-preview-large">
                                <canvas id="chomik_Podglad" width="200" height="200"></canvas>
                            </section>
                            <section class="preview-controls">
                                <label for="uzyjChomika">
                                    <input type="checkbox" id="uzyjChomika" checked>
                                    Użyj mojego chomika w wyścigach
                                </label>
                            </section>
                        </section>
                    </section>
                </section>
            </section>

            <section class="skorki_div">
                <h3>Moje Skiny</h3>
                <section id="posiadane_skiny" class="owned-skins">
                    <!-- Zakupione Skiny -->
                </section>

                <section class="warstwy_skiny">
                    <h4>Aktywne warstwy</h4>
                    <section id="wybrane_skiny">
                        <p class="brak">Brak aktywnych skórek</p>
                    </section>
                </section>
            </section>
        </section>

    </section>

    <script src="script.js"></script>
</body>

</html>

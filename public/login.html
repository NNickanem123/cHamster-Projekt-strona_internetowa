<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="loginModal" class="modal">
        <div class="modal-zawartosc">
            <h2>Zaloguj się</h2>
            <div class="login-form">
                <input type="text" id="username" placeholder="Nazwa użytkownika" maxlength="20">
                <button id="loginBtn" class="btn btn-primary">Zaloguj</button>
            </div>
            <p class="login-info">Jeśli nie masz konta, zostanie utworzone automatycznie</p>
            <br>
            <button onclick="tryb_nocny()" class="btn btn-secondary">
                Tryb nocny
            </button>
        </div>
    </div>
    <script src="../script/skrypt.js"></script>
    <script src="../script/night_theme_logic.js"></script>
</body>

</html>
